<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOU TALK — Блог о психологии</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div data-include="components/header.html"></div>

    <main class="main">
      <div class="gradient-bg"></div>

      <div class="container">
        <div data-include="components/breadcrumbs.html"></div>
        <h1 class="blog__title">Блог</h1>
        <div data-include="components/filters.html"></div>
      </div>

      <div class="container">
        <div class="cards-grid" id="cardsGrid"></div>
      </div>
    </main>

    <div data-include="components/footer.html"></div>

    <!-- ШАБЛОН КАРТОЧКИ -->
    <template id="card-template">
      <article class="card">
        <div class="card__media">
          <img src="images/{{image}}" alt="{{alt}}" class="card__image" />
          <div class="card__badges">{{badges}}</div>
        </div>
        <div class="card__content">
          <h2 class="card__title">{{title}}</h2>
          <div class="card__meta">
            <span class="card__author">{{author}}</span>
          </div>
          <p class="card__description">{{description}}</p>
          <time class="card__date">{{date}}</time>
          <a href="{{link}}" class="card__link">Читать далее →</a>
        </div>
      </article>
    </template>

    <script src="js/pagination.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/pagination-ui.js"></script>
    <script src="js/include.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
