<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOU TALK — Блог о психологии</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ШАПКА (как было, через компонент) -->
    <div data-include="components/header.html"></div>

    <main class="main">
      <!-- Градиентный фон -->
      <div class="gradient-bg"></div>

      <div class="container">
        <!-- Хлебные крошки -->
        <div data-include="components/breadcrumbs.html"></div>
        <h1 class="blog__title">Блог</h1>
        <!-- Фильтры -->
        <div data-include="components/filters.html"></div>
      </div>

      <div class="container">
        <!-- Контейнер для карточек (JS заполнит) -->
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="blog__footer">
          <button class="button button--primary">Еще</button>
        </div>
      </div>
    </main>

    <!-- ФУТЕР (как было, через компонент) -->
    <div data-include="components/footer.html"></div>

    <!-- Шаблоны карточек -->
    <template id="card-template">
      <article class="card">
        <div class="card__media">
          <img class="card__image" alt="" />
          <div class="card__badge card__badge--small">
            <img
              src="images/icon-unicorn.svg"
              alt=""
              class="card__badge-icon"
              width="20"
              height="20"
            />
            <span class="card__badge-text"></span>
          </div>
        </div>
        <div class="card__content">
          <h2 class="card__title"></h2>
          <div class="card__meta">
            <span class="card__author"></span>
          </div>
          <p class="card__description"></p>
          <time class="card__date"></time>
          <a href="#" class="card__link">Читать далее →</a>
        </div>
      </article>
    </template>

    <template id="card-large-template">
      <article class="card card--large">
        <div class="card__media">
          <img class="card__image" alt="" />
          <div class="card__badge card__badge--large">
            <img
              src="images/icon-unicorn.svg"
              alt=""
              class="card__badge-icon"
              width="20"
              height="20"
            />
            <span class="card__badge-text"></span>
          </div>
          <div class="card__badge card__badge--small">
            <img
              src="images/icon-unicorn.svg"
              alt=""
              class="card__badge-icon"
              width="20"
              height="20"
            />
            <span class="card__badge-text"></span>
          </div>
        </div>
        <div class="card__content">
          <h2 class="card__title"></h2>
          <div class="card__meta">
            <span class="card__author"></span>
          </div>
          <p class="card__description"></p>
          <time class="card__date"></time>
          <a href="#" class="card__link">Читать далее →</a>
        </div>
      </article>
    </template>

    <script src="js/include.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
